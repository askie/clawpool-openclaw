interface:
  display_name: "Grix Admin"
  short_description: "Own local OpenClaw binding and follow-up agent management after credential handoff."
  default_prompt: "Support two modes. Mode 1 (bind-local): if caller already provides agent_name/agent_id/api_endpoint/api_key (typically from grix-register), skip remote create and directly run scripts/grix_agent_bind.py configure-local-openclaw ... --apply, then report result. Mode 2 (create-and-bind): only when channels.grix.apiKey already exists locally, validate agentName + describeMessageTool and call grix_agent_admin once, then bind locally. If mode 2 is requested but local main apiKey is missing, route to grix-register. Never ask for website account/password, and avoid route loops."
